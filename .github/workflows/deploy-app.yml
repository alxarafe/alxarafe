name: Deploy App to alxarafe.com

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'doc/**'
      - '*.md'
      - '.github/workflows/deploy-docs.yml'

  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: deploy-app
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend assets
        run: |
          npm install
          npm run dev
          
      - name: Install Composer dependencies
        run: |
          composer update --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs

      - name: Publish framework assets (manual)
        run: |
          php -f src/Scripts/publish_assets_manual.php

      # Build a clean deploy directory with the server structure
      - name: Prepare deploy structure
        run: |
          mkdir -p deploy
          
          # 1. Copy the entire repository into deploy/
          rsync -av --exclude='.git' --exclude='node_modules' --exclude='deploy' --exclude='.github' --exclude='Tests' --exclude='skeleton/Tests' ./ deploy/
          
          # 2. Map skeleton/public to public_html
          mv deploy/skeleton/public deploy/public_html
          
          # 3. Patch index.php so APP_PATH points to skeleton
          sed -i "s|\$baseAppPath = __DIR__ . '/../';|\$baseAppPath = __DIR__ . '/../skeleton';|" deploy/public_html/index.php
          
          # 4. Clear stale Blade cache
          rm -rf deploy/skeleton/var/cache/blade
          mkdir -p deploy/skeleton/var/cache/blade
          chmod -R 775 deploy/skeleton/var/cache

      # Single deploy step to upload everything via SSH (Rsync)
      - name: Deploy to server via SSH
        uses: Burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delete --exclude='vendor/' --exclude='.git/' --exclude='node_modules/' --exclude='config/config.json' --exclude='public_html/docs/'
          path: ./deploy/
          remote_path: /home/u826748402/domains/alxarafe.com/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}
          remote_port: ${{ secrets.SSH_PORT }}

      - name: Run remote composer install
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd domains/alxarafe.com/
            # Use specific PHP version for composer on Hostinger
            php8.2 /usr/local/bin/composer install --no-dev --optimize-autoloader --ignore-platform-reqs

            # Parche automático para el Trait de la dependencia si es necesario
            if [ -d vendor/alxarafe/resource-controller/src/Trait ]; then
                echo "Aplicando parche de compatibilidad para ResourceTrait..."
                mv vendor/alxarafe/resource-controller/src/Trait vendor/alxarafe/resource-controller/src/Traits
                sed -i 's/namespace Alxarafe\\ResourceController\\Trait;/namespace Alxarafe\\ResourceController\\Traits;/' vendor/alxarafe/resource-controller/src/Traits/ResourceTrait.php
            fi
